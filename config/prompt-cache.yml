backend: redis
eviction_policy: slru
max_size_mb: 512.0
max_items: 50000
default_ttl_seconds: 3600.0
redis_url: redis://redis:6379/0
redis_pool_size: 50
redis_socket_timeout_seconds: 1.5
disk_cache_dir: /var/lib/prompt-cache
semantic_cache_enabled: false
semantic_similarity_threshold: 0.92
namespace: prod
version: v1
enable_metrics: true
log_level: INFO
service_host: 0.0.0.0
service_port: 8000
protected_segment_ratio: 0.8
metrics_buffer_size: 20000
